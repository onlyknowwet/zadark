name: Build browser extensions

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-extensions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build extensions
        run: yarn build

      - name: Package Chrome extension
        working-directory: build/chrome
        run: zip -r ../../zadark-chrome.zip .

      - name: Package Firefox source
        if: github.event_name == 'workflow_dispatch'
        run: git archive --format=zip --output=zadark-firefox-source.zip HEAD

      - name: Sign Firefox extension through Mozilla AMO
        if: github.event_name == 'workflow_dispatch'
        run: |
          npx --yes web-ext@8 sign \
            --source-dir=build/firefox \
            --channel=unlisted \
            --artifacts-dir=web-ext-artifacts \
            --upload-source-code=zadark-firefox-source.zip
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: zadark-chrome
          path: zadark-chrome.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload signed Firefox extension
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: zadark-firefox-signed
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error
          retention-days: 14
