name: Build browser extensions

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-extensions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build extensions
        run: yarn build

      - name: Package Chrome extension
        working-directory: build/chrome
        run: zip -r ../../zadark-chrome.zip .

      - name: Package Firefox extension
        working-directory: build/firefox
        run: zip -r ../../zadark-firefox.zip .

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: zadark-chrome
          path: zadark-chrome.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Firefox extension
        uses: actions/upload-artifact@v4
        with:
          name: zadark-firefox
          path: zadark-firefox.zip
          if-no-files-found: error
          retention-days: 14
